name: GHCR Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build and push image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set build metadata
        id: build_meta
        shell: bash
        run: |
          owner_lower="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          repo_lower="$(echo '${{ github.event.repository.name }}' | tr '[:upper:]' '[:lower:]')"
          short_sha="${GITHUB_SHA::7}"
          build_date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          echo "image=ghcr.io/${owner_lower}/${repo_lower}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${short_sha}" >> "$GITHUB_OUTPUT"
          echo "build_date=${build_date}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.build_meta.outputs.image }}
          tags: |
            type=raw,value=main-${{ steps.build_meta.outputs.short_sha }}
            type=sha,prefix=sha-
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          build-args: |
            VERSION=main-${{ steps.build_meta.outputs.short_sha }}
            COMMIT=${{ github.sha }}
            DATE=${{ steps.build_meta.outputs.build_date }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        shell: bash
        run: |
          image="${{ steps.build_meta.outputs.image }}"
          digest="${{ steps.build.outputs.digest }}"
          tag="main-${{ steps.build_meta.outputs.short_sha }}"

          {
            echo "### GHCR image published"
            echo
            echo "- Image: \`${image}:${tag}\`"
            echo "- Digest: \`${image}@${digest}\`"
            echo
            echo "Use the digest form in production compose files."
          } >> "$GITHUB_STEP_SUMMARY"
